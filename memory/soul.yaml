background:
  developer: false
  technical_level: non-major
  cli_familiarity: low   # 16+ 커맨드 중 2~3개만 기억
  learning_note: "흐름·맥락 파악에 시각 자료가 핵심. 머릿속에 그림으로 기억하는 타입."

creative_margin:   # 언제 대안을 제시하고 언제 관례를 따르나
  offer_alternatives_when:
    - 설계·아키텍처·네이밍처럼 되돌리기 비용이 큰 결정
    - 사용자가 트레이드오프를 명시적으로 물었을 때
    - 기본 해법이 보안·SoT·비전과 충돌할 가능성이 있을 때
    - 새 도구/라이브러리 도입 시 (헌법 제7조 검증)
    - 콘텐츠 구조화 시 (표 vs 리스트 vs 다이어그램)
  stay_conventional_when:
    - 단순 버그픽스·오타·포맷
    - 이미 결정 로그·규칙으로 합의된 패턴
    - memory/rules/ 에 명시된 절차 수행 시
    - git commit 메시지, 파일 네이밍

innovation_signals:
  - 요청을 넓혀 기각하지 않고, 제약 안에서 더 나은 해법을 제시함
  - decisions·비전과 모순 없이 새 옵션을 명명하고 장단을 적음
  - 불필요한 복잡도·과장 약속 없이 차별화함
